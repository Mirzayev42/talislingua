<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talislingua | Lənkəran Pro Lüğəti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap&subset=latin-ext" rel="stylesheet">

    <style>
        :root {
            --az-blue: #0077c8; --az-red: #ee3124; --az-green: #009944; --lenkaran-gold: #ffd700;
        }
        body {
            background-color: #0f172a; font-family: 'Poppins', sans-serif;
            min-height: 100vh; margin: 0; position: relative;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; opacity: 0.55; z-index: -1;
            filter: saturate(1.5) contrast(1.2) brightness(0.7);
        }
        .lenkaran-logo-container { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; margin-top: 40px; }
        .logo-circle { position: absolute; width: 130px; height: 130px; border-radius: 50%; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 4px solid white; overflow: hidden; display: flex; flex-direction: column; z-index: 10; }
        .inner-flag { flex: 1; width: 100%; }
        .f-blue { background: var(--az-blue); } .f-red { background: var(--az-red); } .f-green { background: var(--az-green); }

        @keyframes syncGlow { 0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.3)) brightness(1); opacity: 0.8; } 50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)) brightness(1.4); opacity: 1; } }
        @keyframes leafSyncGlow { 0%, 100% { filter: drop-shadow(0 0 3px rgba(21, 128, 61, 0.4)) brightness(1); } 50% { filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.9)) brightness(1.3); } }

        .corner-leaf { position: absolute; color: #15803d; font-size: 2.2rem; z-index: 5; transform: rotate(var(--rotation)); animation: leafSyncGlow 2.5s ease-in-out infinite; }
        .leaf-left { --rotation: -30deg; bottom: 15px; left: -15px; }
        .leaf-right { --rotation: 30deg; bottom: 15px; right: -15px; }
        .glowing-ship { position: absolute; z-index: 20; font-size: 3.2rem; color: #ffd700; animation: syncGlow 2.5s ease-in-out infinite; }

        .glass-card { background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(25px); border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .data-row { background: white; border-radius: 18px; transition: all 0.3s ease; }
        .data-row:hover { transform: scale(1.01); }

        .search-input-mini { background: rgba(255,255,255,0.9); border: 2px solid transparent; transition: all 0.3s; }
        .search-input-mini:focus { border-color: #0077c8; box-shadow: 0 0 15px rgba(0,119,200,0.2); }

        .hidden { display: none; }
    </style>
</head>
<body class="py-10 px-6">

<div class="max-w-6xl mx-auto flex flex-col items-center">
    <div class="lenkaran-logo-container mb-6">
        <i class="fas fa-leaf corner-leaf leaf-left"></i>
        <div class="logo-circle"><div class="inner-flag f-blue"></div><div class="inner-flag f-red"></div><div class="inner-flag f-green"></div></div>
        <i class="fas fa-ship glowing-ship"></i>
        <i class="fas fa-leaf corner-leaf leaf-right"></i>
    </div>

    <h1 class="text-5xl font-black text-white tracking-tighter drop-shadow-lg">TALISLINGUA <span class="text-blue-400 text-xl align-top">PRO</span></h1>
    <p class="text-lg text-blue-400 mt-2 font-extrabold uppercase tracking-[0.3em] mb-8">Lənkəran • Astara • Lerik</p>

    <div class="w-full max-w-2xl mb-10 text-center">
        <div class="relative">
            <input type="text" id="searchInput"
                   class="search-input-mini w-full p-4 pl-12 rounded-2xl text-lg font-bold text-slate-800 outline-none"
                   placeholder="Sürətli axtarış...">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
        </div>

        <div th:if="${wordOfDay}" style="text-align: center; margin-top: 25px; color: white; font-family: 'Arial', sans-serif;">
            <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">
                Günün Sözü
            </p>
            <div style="background: rgba(255, 255, 255, 0.1); display: inline-block; padding: 10px 25px; border-radius: 50px; backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);">
                <span style="font-size: 1.5rem; font-weight: bold;" th:text="${wordOfDay.talisWord}">Vıl</span>
                <span style="margin: 0 10px; opacity: 0.5;">—</span>
                <span style="font-size: 1.3rem; opacity: 0.9;" th:text="${wordOfDay.azTranslation}">Gül</span>
            </div>
        </div>

        <div id="searchResult" class="hidden mt-3 space-y-2 text-left">
        </div>
    </div>

    <div class="w-full max-w-4xl mx-auto mt-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
            <div class="flex gap-8">
                <div class="text-center">
                    <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">Söz Sayı</p>
                    <h4 th:text="${words.size()}" class="text-3xl font-black text-white italic">0</h4>
                </div>
                <div class="text-center border-x border-white/10 px-8">
                    <p class="text-green-400 text-[10px] font-black uppercase tracking-[0.2em]">Dillər</p>
                    <h4 class="text-3xl font-black text-white italic">3</h4>
                </div>
                <div class="text-center">
                    <p class="text-yellow-400 text-[10px] font-black uppercase tracking-[0.2em]">Region</p>
                    <h4 class="text-3xl font-black text-white italic">LNK</h4>
                </div>
            </div>

            <button onclick="toggleTable()" class="group relative px-8 py-4 bg-white/5 hover:bg-white/10 backdrop-blur-xl rounded-2xl border border-white/10 transition-all duration-500 overflow-hidden">
                <span class="relative z-10 flex items-center gap-3 text-white font-bold tracking-widest text-xs">
                    <i class="fas fa-list-ul text-blue-400 group-hover:rotate-180 transition-transform duration-500"></i>
                    TAM SİYAHIYA BAX
                </span>
                <div class="absolute inset-0 bg-gradient-to-r from-blue-600/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
        </div>

        <div id="mainTableArea" class="hidden glass-card w-full overflow-hidden transition-all duration-700">
            <div class="p-8 overflow-x-auto">
                <table class="w-full border-separate border-spacing-y-3">
                    <thead>
                    <tr class="text-blue-900 text-[10px] uppercase tracking-[0.3em] font-black opacity-60">
                        <th class="pb-4 text-center">Azərbaycanca</th> <th class="pb-4 text-center">Talışca</th>      <th class="pb-4 text-center">İngiliscə</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="word : ${words}" class="data-row">
                        <td class="px-6 py-4 text-slate-600 font-semibold text-lg text-center" th:text="${word.azTranslation}"></td>
                        <td class="px-6 py-4 font-bold text-xl text-slate-800 text-center rounded-l-2xl" th:text="${word.talisWord}"></td>
                        <td class="px-6 py-4 text-center rounded-r-2xl">
                            <span class="bg-blue-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold" th:text="${word.enTranslation}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-center text-white/60 text-xs">
        <p>© 2026 Talislingua | <span class="text-blue-400 font-bold">Lənkəran Rəqəmsal Lüğəti</span></p>
    </footer>
</div>

<script>
    const searchInput = document.getElementById('searchInput');
    const resultsArea = document.getElementById('searchResult');
    const tableContainer = document.getElementById('mainTableArea');

    function toggleTable() {
        if (tableContainer.classList.contains('hidden')) {
            tableContainer.classList.remove('hidden');
            tableContainer.scrollIntoView({ behavior: 'smooth' });
        } else {
            tableContainer.classList.add('hidden');
        }
    }

    searchInput.addEventListener('input', function() {
        const query = this.value.trim();

        if (query.length < 1) {
            resultsArea.innerHTML = '';
            resultsArea.classList.add('hidden');
            tableContainer.style.opacity = "1";
            return;
        }

        fetch(`/api/v1/words/search?query=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                resultsArea.innerHTML = '';
                resultsArea.classList.remove('hidden');
                tableContainer.style.opacity = "0.2";

                if (data.length === 0) {
                    resultsArea.innerHTML = `<div class="bg-white/10 text-white p-4 rounded-xl text-center text-xs italic border border-white/10">Söz tapılmadı</div>`;
                } else {
                    data.forEach(word => {
                        resultsArea.innerHTML += `
                            <div class="bg-white/90 backdrop-blur-md rounded-xl p-3 flex items-center justify-between shadow-lg border-l-4 border-blue-500">
                                <div class="flex-1 px-3">
                                    <p class="text-[7px] text-green-600 font-black uppercase">Azər</p>
                                    <h3 class="text-lg font-bold text-slate-800">${word.azTranslation}</h3>
                                </div>
                                <div class="flex-1 px-3 text-center border-x border-slate-100">
                                    <p class="text-[7px] text-blue-500 font-black uppercase">Talış</p>
                                    <h3 class="text-lg font-bold text-slate-800">${word.talisWord}</h3>
                                </div>
                                <div class="flex-1 px-3 text-right">
                                    <p class="text-[7px] text-slate-400 font-black uppercase">En</p>
                                    <h3 class="text-sm font-semibold text-slate-500">${word.enTranslation}</h3>
                                </div>
                            </div>`;
                    });
                }
            })
            .catch(err => console.error("Xəta:", err));
    });

    // Günün sözü üçün əlavə olunan kod
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/api/v1/words/day')
            .then(response => response.json())
            .then(data => {
                if(data && data.talisWord) {
                    console.log("Günün sözü yükləndi:", data.talisWord);
                }
            })
            .catch(err => console.error("Günün sözü gətirilərkən xəta:", err));
    });
</script>

</body>
</html>
