server:
  port: ${PORT:8080}

spring:
  application:
    name: talis-dictionary

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML
    encoding: UTF-8

  datasource:
    # Docker-də işləyəndə SPRING_DATASOURCE_URL mühit dəyişəni 'db' hostuna baxmalıdır
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/talislingua_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:rasif1103!}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dialekti avtomatik təyin etməsi üçün bunu silə də bilərsən, amma qalsa da ziyanı yoxdur
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

# Əlavə etdiyimiz Unsplash bölməsi
unsplash:
  access-key: ${UNSPLASH_ACCESS_KEY:L2nkNANBwps0OHTcVOkmwC5pTWO7q9ok_atwDg2v8Pw}
  api-url: https://api.unsplash.com/search/photos
